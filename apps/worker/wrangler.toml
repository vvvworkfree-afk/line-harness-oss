name = "line-harness"
main = "src/index.ts"
compatibility_date = "2024-12-01"
workers_dev = true
account_id = "YOUR_DEV_ACCOUNT_ID"

[[d1_databases]]
binding = "DB"
database_name = "line-harness"
database_id = "YOUR_DEV_D1_DATABASE_ID"

[[r2_buckets]]
binding = "IMAGES"
bucket_name = "line-harness-images"

[triggers]
crons = ["*/5 * * * *"]
